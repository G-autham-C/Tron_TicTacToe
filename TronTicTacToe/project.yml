name: TronTicTacToe
options:
  bundleIdPrefix: com.portfolio
  deploymentTarget:
    iOS: "17.0"
targets:
  TronTicTacToe:
    type: application
    platform: iOS
    sources: [TronTicTacToe]
    info:
      path: TronTicTacToe/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleDisplayName: TronTicTacToe
        CFBundleIconName: AppIcon
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
